<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mantenimientos</title>

    <link rel="stylesheet" href="css/style.css">

    <style>

        .contenedor{
            width:700px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        input, select{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:12px;
        }

        table{
            width:100%;
            margin-top:30px;
            border-collapse:collapse;
        }

        th,td{
            border:1px solid gray;
            padding:10px;
            text-align:center;
        }

    </style>

</head>

<body>

<div class="contenedor">

<h1>Registro de Mantenimientos</h1>

<label>Vehículo</label>

<select id="vehiculo">
    <option value="">Seleccione un vehículo</option>
</select>

<label>Fecha</label>

<input type="date" id="fecha">

<label>Descripción</label>

<input type="text" id="descripcion" placeholder="Descripción del mantenimiento">

<label>Costo</label>

<input type="number" id="costo" placeholder="Costo">

<label>Estado</label>

<select id="estado">
    <option value="Pendiente">Pendiente</option>
    <option value="Finalizado">Finalizado</option>
</select>

<button id="btnGuardar">Guardar Mantenimiento</button>

<h2>Mantenimientos Registrados</h2>

<table>

<thead>

<tr>

<th>Vehículo</th>
<th>Fecha</th>
<th>Descripción</th>
<th>Costo</th>
<th>Estado</th>
<th>Acciones</th>

</tr>

</thead>

<tbody id="tablaMantenimientos">

</tbody>

</table>

<br>

<a href="menu.html">⬅ Volver al menú</a>

</div>

<script src="js/mantenimiento.js"></script>

</body>
</html>
