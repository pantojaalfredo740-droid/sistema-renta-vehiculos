```html
<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Menú Principal</title>

    <link rel="stylesheet" href="css/style.css">

    <style>

        body{
            background:#f4f4f4;
            font-family:Arial, Helvetica, sans-serif;
        }

        .menu{

            width:550px;

            margin:40px auto;

            background:white;

            padding:30px;

            border-radius:10px;

            box-shadow:0px 0px 10px gray;

            text-align:center;

        }

        h2{
            color:#007BFF;
        }

        .resumen{

            background:#f8f8f8;

            border-radius:8px;

            padding:15px;

            margin:20px 0;

            text-align:left;

        }

        .resumen p{

            margin:8px 0;

            font-size:18px;

        }

        a{

            display:block;

            margin:12px 0;

            padding:15px;

            background:#007BFF;

            color:white;

            text-decoration:none;

            border-radius:5px;

            text-align:center;

            font-size:18px;

        }

        a:hover{

            background:#0056b3;

        }

    </style>

</head>

<body>

<div class="menu">

    <h1>🚗 Sistema de Renta de Vehículos</h1>

    <h2 id="bienvenida"></h2>

    <p id="fecha"></p>

    <div class="resumen">

        <h3>📊 Resumen del Sistema</h3>

        <p>👤 Clientes: <span id="totalClientes">0</span></p>

        <p>🚗 Vehículos: <span id="totalVehiculos">0</span></p>

        <p>📅 Rentas: <span id="totalRentas">0</span></p>

        <p>🔧 Mantenimientos: <span id="totalMantenimientos">0</span></p>

    </div>

    <a href="clientes.html">👤 Clientes</a>

    <a href="vehiculos.html">🚗 Vehículos</a>

    <a href="rentas.html">📅 Rentas</a>

    <a href="choferes.html">🧑‍✈️ Choferes</a>

    <a href="mantenimiento.html">🔧 Mantenimientos</a>

    <a href="#" onclick="cerrarSesion()">🚪 Cerrar sesión</a>

</div>

<script>

if(localStorage.getItem("sesion") !== "activa"){

    window.location.href="index.html";

}

document.getElementById("bienvenida").innerHTML =
"Bienvenido, Administrador";

function actualizarFecha(){

    const hoy = new Date();

    document.getElementById("fecha").innerHTML =
    hoy.toLocaleString();

}

setInterval(actualizarFecha,1000);

actualizarFecha();

async function cargarResumen(){

    try{

        const clientes = await fetch("http://localhost:3000/api/clientes");
        const vehiculos = await fetch("http://localhost:3000/api/vehiculos");
        const rentas = await fetch("http://localhost:3000/api/rentas");
        const mantenimientos = await fetch("http://localhost:3000/api/mantenimientos");

        const c = await clientes.json();
        const v = await vehiculos.json();
        const r = await rentas.json();
        const m = await mantenimientos.json();

        document.getElementById("totalClientes").textContent = c.length;
        document.getElementById("totalVehiculos").textContent = v.length;
        document.getElementById("totalRentas").textContent = r.length;
        document.getElementById("totalMantenimientos").textContent = m.length;

    }catch(error){

        console.log(error);

    }

}

cargarResumen();

function cerrarSesion(){

    if(confirm("¿Deseas cerrar sesión?")){

        localStorage.removeItem("sesion");

        window.location.href="index.html";

    }

}

</script>

</body>

</html>
